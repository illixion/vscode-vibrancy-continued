name: Tests
on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:unit

  integration-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:integration

  e2e-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # To use self-hosted runners with a real desktop for reliable screenshots,
        # replace entries with your self-hosted labels, e.g.:
        #   os: [self-hosted-linux, self-hosted-macos, self-hosted-windows]
        # Self-hosted runners need: Node.js 20+, git, and a desktop session.
        # On Linux self-hosted: also install imagemagick.
        os: [ubuntu-latest, macos-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install @vscode/test-electron
      - name: Install screenshot tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e
      - name: Run E2E tests (macOS)
        if: runner.os == 'macOS'
        run: npm run test:e2e
      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.os }}
          path: test/screenshots/
          if-no-files-found: ignore

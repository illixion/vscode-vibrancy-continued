name: Tests
on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  schedule:
    # Daily at 08:00 UTC — catches VS Code Insiders updates (released ~daily)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VS Code version to test (stable, insiders, or a specific version)'
        required: false
        default: 'insiders'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-report
          path: test-results/vitest-report.xml

  e2e-tests:
    runs-on: ${{ matrix.os }}
    env:
      # Scheduled runs test against Insiders to catch breaking changes early.
      # Manual dispatch uses the chosen version. Push/PR runs use stable.
      VSCODE_VERSION: ${{ (github.event_name == 'schedule' && 'insiders') || (github.event_name == 'workflow_dispatch' && inputs.vscode_version) || 'stable' }}
    strategy:
      fail-fast: false
      matrix:
        # To use self-hosted runners with a real desktop for reliable screenshots,
        # replace entries with your self-hosted labels, e.g.:
        #   os: [self-hosted-linux, self-hosted-macos, self-hosted-windows]
        # Self-hosted runners need: Node.js 20+, git, and a desktop session.
        # On Linux self-hosted: also install imagemagick.
        os: [ubuntu-latest, macos-latest, windows-11-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install @vscode/test-electron @vscode/vsce
      - name: Build native modules (Windows)
        if: runner.os == 'Windows'
        run: |
          npm install -g node-gyp
          npm install node-addon-api
          mv binding.gyp.dist binding.gyp
          npm run build-win10
          mkdir -p native/prebuilt
          cp build/Release/vibrancy.node native/prebuilt/vibrancy-${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}.node
          cp build/Release/displayconfig.node native/prebuilt/displayconfig-${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}.node
          mv binding.gyp binding.gyp.dist
        shell: bash
      - name: Install screenshot tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e
      - name: Run E2E tests (macOS)
        if: runner.os == 'macOS'
        run: npm run test:e2e
      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.os }}
          path: test/screenshots/
          if-no-files-found: ignore

  ci:
    if: always()
    needs: [tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        if: always()
        with:
          name: vitest-report
          path: test-results/
      - uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Vitest Results
          path: test-results/vitest-report.xml
          reporter: java-junit
          list-tests: all
          list-suites: all
      - name: Notify Telegram on failure
        if: needs.tests.result != 'success' || needs.e2e-tests.result != 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          BRANCH: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
          TESTS_RESULT: ${{ needs.tests.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          MESSAGE=$'\xE2\x9D\x8C Tests failed in '"$REPO"$'\nBranch: '"$BRANCH"$'\nEvent: '"$EVENT"$'\nUnit: '"$TESTS_RESULT"$'\nE2E: '"$E2E_RESULT"$'\nRun: '"$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          curl -sS --fail-with-body -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=true"
      - run: |
          if [[ "${{ needs.tests.result }}" != "success" || "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
